services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: backend

    ports:
      - "8000:8000"

    env_file:
      - ./.env

    restart: unless-stopped

    volumes:
      - ./backend:/app

    command: uvicorn backend:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: frontend

    working_dir: /app/my-app

    ports:
      - "5173:5173"

    volumes:
      - ./frontend/my-app:/app/my-app
      - /app/my-app/node_modules

    depends_on:
      - backend

    command: npm run dev -- --host 0.0.0.0 --port 5173